services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: db_stress
      POSTGRES_USER: zeba
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/db_stress
      SPRING_DATASOURCE_USERNAME: zeba
      SPRING_DATASOURCE_PASSWORD: password

volumes:
  postgres_data:
